name: "Workflow Commands"

on:
  push:
    branches:
      ['staging']

job:
  first job to run:
    run-on: 'ubantu-latest'
    steps:
      - name: "grouping logging"
        run: |
          echo "::group::My Group Message"
          echo "Msg1"
          echo "Msg2"
          echo "::endgroup::"

      - name: "step 1"
        run: |
          echo "MY_VAL = hello" >> $GITHUB_ENV
        
      - name: "Step 2"
        run: |
          echo $MY_VAL