name: "Workflow Commands"

on:
  push:
    branches:
      - main

jobs:
  first_job_to_run:
    runs-on: ubuntu-latest

    steps:
      - name: "grouping logging"
        run: |
          echo "::group::My Group Message"
          echo "Msg1"
          echo "Msg2"
          echo "::endgroup::"

      - name: "Step 1"
        run: echo "MY_VAL=hello" >> $GITHUB_ENV
        
      - name: "Step 2"
        run: echo $MY_VAL