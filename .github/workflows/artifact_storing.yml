name: Artifact Example

on:
  push:
    branches:
      - staging

jobs:
  my-artifact-storing-jobs:
    runs-on: ubuntu-latest

    steps:
      - id: checkout-repo
        uses: actions/checkout@v4

      - id: build
        run: |
            cd client
            npm run build

      - id: artifact-building
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: client/dist/
          retention-days: 5 # Automatically deletes after 5 days
